<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Emílio">
    <meta name="description" content="Tabelas">
    <title>Tabelas</title>
     <link rel="stylesheet" href="tabelas.css">
</head>
<body>

    <h1>Criando Tabelas em HTML</h1>
    <h2>Cursos da Escola SENAI/AC</h2>

    <table>
        <!--a tag TR + TH colunas-->
        <tr>
            <!--a TH cria as colunas de uma tabela -->
            <th>Cursos de Aprendizagem</th>
            <th>Curso Técnico</th>
        </tr>
         
        <tr>
            <!--a tag TD insere o conteúdo em uma célula-->
            <td>Programador Full Stack</td>
            <td>Eletrotécnico</td>
        </tr>
    </table>
    <br><br><br>
    
    <img src="tenis.jpg" alt="50%">
    
</body>
</html>
