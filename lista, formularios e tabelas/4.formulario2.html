<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Emílio">
    <meta name="description" content="formulário em HTML">
    <title>Criando Formulários em HTML</title>
    <link rel="stylesheet" href="formulario2.css">
</head>
<body>

    <div class="container">

   

    <h1>Inscreva-se preenchendo o formulário</h1>
    <h2>Escola Senai</h2>
     <form>
        <label for="name">Nome Completo</label>
        <input type="text" id="name"> <br><br>

         <label for="email">E-mail</label>
        <input type="email" id="email"> <br><br>

        <label for="tel">Telefone</label> 
        <input type="tel" id="tel"> <br><br>

        <label for="name">Sexo Masculino</label> 
        <input type="radio" id="name"> <br><br>

         <label for="name">Sexo Feminno</label> 
        <input type="radio" id="name"> <br><br>

         <label for="CPF">Digite seu CPF</label>
        <input type="number" id="number"> <br><br>

         <label for="Curso">Cursos</label>
        <select name="Curso" id="Curso">
             <option value="Full Stack">Programador Full Stack</option>
             <option value="Mecânico">Mecânico de Automóveis</option>
             <option value="Eletricista">Eletricista Predial</option>
        </select> <br><br>
        
         <label for="date">Data de Nascimento</label>
        <input type="date" id="date"> <br><br>

        <label for="password">Senha</label>
        <input type="password" id="password"> <br><br>

        <input type="submit" id="btn-enviar" name="btn-enviar" required> <br><br>

       
    </form>
     </div>
    
</body>
</html>
